<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Linkfy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <!-- Notification -->
    <div id="notification" class="fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 hidden">
        <span id="notificationMessage"></span>
    </div>

    <!-- Navigation -->
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center space-x-2">
                        <i data-lucide="link-2" class="w-8 h-8 text-indigo-600"></i>
                        <span class="text-2xl font-bold text-indigo-600">Linkfy</span>
                    </a>
                </div>

                <div class="flex items-center space-x-4">
                    <span id="userInfo" class="text-gray-700"></span>
                    <button id="logoutBtn" class="text-gray-700 hover:text-indigo-600">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center">
                <div>
                    <h1 class="text-3xl font-bold mb-2">Dashboard</h1>
                    <p id="userPlan" class="text-gray-600"></p>
                </div>
                <button id="upgradBtn" class="mt-4 md:mt-0 bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-6 py-3 rounded-lg font-semibold hover:shadow-lg transition hidden">
                    <i data-lucide="crown" class="w-5 h-5 inline mr-2"></i>
                    Premium'a Geç
                </button>
            </div>

            <!-- Tabs -->
            <div class="flex space-x-4 border-b mt-6">
                <button id="linksTab" class="pb-3 px-4 font-semibold border-b-2 border-indigo-600 text-indigo-600">
                    Linklerim
                </button>
                <button id="bioTab" class="pb-3 px-4 font-semibold text-gray-600 hover:text-indigo-600">
                    Bio Sayfalarım
                </button>
            </div>
        </div>

        <!-- Links Section -->
        <div id="linksSection">
            <div class="mb-6">
                <button id="createLinkBtn" class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-indigo-700">
                    <i data-lucide="link" class="w-5 h-5 inline mr-2"></i>
                    Kısa Link Oluştur
                </button>
            </div>

            <!-- Create Link Form -->
            <div id="createLinkForm" class="bg-white rounded-xl shadow-lg p-6 mb-6 hidden">
                <h3 class="text-xl font-bold mb-4">Kısa Link Oluştur</h3>
                <form id="linkForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Orijinal URL</label>
                        <input 
                            type="url" 
                            id="originalUrl"
                            required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                            placeholder="https://example.com/very-long-url"
                        >
                    </div>
                    <div class="flex space-x-3">
                        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-indigo-700">
                            Oluştur
                        </button>
                        <button type="button" id="cancelLinkBtn" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg font-semibold hover:bg-gray-300">
                            İptal
                        </button>
                    </div>
                </form>
            </div>

            <!-- Links List -->
            <div id="linksList" class="grid gap-4"></div>
        </div>

        <!-- Bio Section -->
        <div id="bioSection" class="hidden">
            <div class="mb-6">
                <button id="createBioBtn" class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-indigo-700">
                    <i data-lucide="user" class="w-5 h-5 inline mr-2"></i>
                    Bio Sayfası Oluştur
                </button>
            </div>

            <!-- Create/Edit Bio Form -->
            <div id="bioForm" class="bg-white rounded-xl shadow-lg p-6 mb-6 hidden">
                <h3 class="text-xl font-bold mb-6">Bio Sayfası Oluştur</h3>
                <form id="bioPageForm">
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-2">Başlık</label>
                                <input type="text" id="bioTitle" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Açıklama</label>
                                <textarea id="bioDescription" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Profil Resmi URL</label>
                                <input type="url" id="bioProfileImage" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="https://example.com/avatar.jpg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Tema Seç</label>
                                <div class="grid grid-cols-2 gap-3">
                                    <button type="button" class="theme-btn p-4 rounded-lg border-2 border-gray-200" data-theme="minimal">
                                        <div class="h-16 bg-white rounded mb-2"></div>
                                        <p class="text-sm font-medium">Minimal</p>
                                    </button>
                                    <button type="button" class="theme-btn p-4 rounded-lg border-2 border-gray-200" data-theme="gradient">
                                        <div class="h-16 bg-gradient-to-br from-purple-400 to-pink-400 rounded mb-2"></div>
                                        <p class="text-sm font-medium">Gradient</p>
                                    </button>
                                    <button type="button" class="theme-btn p-4 rounded-lg border-2 border-gray-200" data-theme="dark">
                                        <div class="h-16 bg-gray-900 rounded mb-2"></div>
                                        <p class="text-sm font-medium">Koyu</p>
                                    </button>
                                    <button type="button" class="theme-btn p-4 rounded-lg border-2 border-gray-200" data-theme="colorful">
                                        <div class="h-16 bg-gradient-to-br from-yellow-400 via-red-500 to-pink-500 rounded mb-2"></div>
                                        <p class="text-sm font-medium">Renkli</p>
                                    </button>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <label class="block text-sm font-medium">Linkler</label>
                                    <button type="button" id="addBioLinkBtn" class="text-indigo-600 text-sm font-medium hover:underline">
                                        + Link Ekle
                                    </button>
                                </div>
                                <div id="bioLinksList" class="space-y-3"></div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Önizleme</label>
                            <div id="bioPreview" class="bg-white rounded-xl p-8 min-h-96"></div>
                        </div>
                    </div>
                    <div class="flex space-x-3 mt-6">
                        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-indigo-700">
                            Kaydet
                        </button>
                        <button type="button" id="cancelBioBtn" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg font-semibold hover:bg-gray-300">
                            İptal
                        </button>
                    </div>
                </form>
            </div>

            <!-- Bio Pages List -->
            <div id="bioPagesList" class="grid gap-4"></div>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div id="qrModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl p-8 max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">QR Kod</h3>
                <button id="closeQrModal" class="text-gray-500 hover:text-gray-700">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div id="qrcode" class="flex justify-center mb-6"></div>
            <button id="downloadQr" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700">
                <i data-lucide="download" class="w-5 h-5 inline mr-2"></i>
                İndir
            </button>
        </div>
    </div>

    <script src="assets/js/dashboard.js"></script>
</body>
</html>
