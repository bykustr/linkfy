<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Sıfırla - Linkfy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center px-4">
    <!-- Notification -->
    <div id="notification" class="fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 hidden">
        <span id="notificationMessage"></span>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center space-x-2 mb-4">
                <i data-lucide="link-2" class="w-10 h-10 text-indigo-600"></i>
                <span class="text-3xl font-bold text-indigo-600">Linkfy</span>
            </a>
            <h2 class="text-2xl font-bold text-gray-900">Şifre Sıfırla</h2>
        </div>

        <!-- Request Form -->
        <div id="requestForm">
            <p class="text-gray-600 mb-6">E-posta adresinizi girin, size şifre sıfırlama linki gönderelim.</p>
            <form id="resetRequestForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">E-posta</label>
                    <input 
                        type="email" 
                        id="email"
                        required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        placeholder="ornek@email.com"
                    >
                </div>

                <button 
                    type="submit"
                    id="submitBtn"
                    class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition disabled:opacity-50"
                >
                    Sıfırlama Linki Gönder
                </button>
            </form>
        </div>

        <!-- Reset Form (shown when token is present) -->
        <div id="resetForm" class="hidden">
            <p class="text-gray-600 mb-6">Yeni şifrenizi belirleyin.</p>
            <form id="newPasswordForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Yeni Şifre</label>
                    <input 
                        type="password"
                        id="newPassword"
                        required
                        minlength="6"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        placeholder="••••••••"
                    >
                    <p class="text-xs text-gray-500 mt-1">En az 6 karakter</p>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Şifre Tekrar</label>
                    <input 
                        type="password"
                        id="confirmPassword"
                        required
                        minlength="6"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        placeholder="••••••••"
                    >
                </div>

                <button 
                    type="submit"
                    id="resetBtn"
                    class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition disabled:opacity-50"
                >
                    Şifreyi Güncelle
                </button>
            </form>
        </div>

        <!-- Back to Login -->
        <div class="mt-6 text-center">
            <a href="login.html" class="text-sm text-gray-500 hover:text-gray-700">
                ← Giriş sayfasına dön
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        function showNotification(message, isError = false) {
            const notification = document.getElementById('notification');
            const notificationMessage = document.getElementById('notificationMessage');
            
            notificationMessage.textContent = message;
            notification.className = `fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 ${isError ? 'bg-red-500' : 'bg-green-500'} text-white`;
            notification.classList.remove('hidden');
            
            setTimeout(() => {
                notification.classList.add('hidden');
            }, 5000);
        }

        // If token exists, show reset form and verify token
        if (token) {
            verifyToken(token);
        }

        async function verifyToken(token) {
            try {
                const response = await fetch('/api/password_reset.php?action=verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('requestForm').classList.add('hidden');
                    document.getElementById('resetForm').classList.remove('hidden');
                } else {
                    showNotification(data.message || 'Geçersiz veya süresi dolmuş link', true);
                    setTimeout(() => {
                        window.location.href = '/reset-password.html';
                    }, 3000);
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Bir hata oluştu', true);
            }
        }

        // Request password reset
        document.getElementById('resetRequestForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Gönderiliyor...';

            try {
                const response = await fetch('/api/password_reset.php?action=request', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    showNotification(data.message);
                    document.getElementById('resetRequestForm').reset();
                    
                    // DEBUG: Show reset link in console (remove in production)
                    if (data.debug && data.debug.reset_link) {
                        console.log('Reset link:', data.debug.reset_link);
                        alert('DEV MODE: Check console for reset link');
                    }
                } else {
                    showNotification(data.message, true);
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Bir hata oluştu', true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sıfırlama Linki Gönder';
            }
        });

        // Reset password
        document.getElementById('newPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');

            if (newPassword !== confirmPassword) {
                showNotification('Şifreler eşleşmiyor', true);
                return;
            }

            if (newPassword.length < 6) {
                showNotification('Şifre en az 6 karakter olmalıdır', true);
                return;
            }

            resetBtn.disabled = true;
            resetBtn.textContent = 'Güncelleniyor...';

            try {
                const response = await fetch('/api/password_reset.php?action=reset', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        token,
                        password: newPassword 
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showNotification(data.message);
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    showNotification(data.message, true);
                    resetBtn.disabled = false;
                    resetBtn.textContent = 'Şifreyi Güncelle';
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Bir hata oluştu', true);
                resetBtn.disabled = false;
                resetBtn.textContent = 'Şifreyi Güncelle';
            }
        });
    </script>
</body>
</html>
